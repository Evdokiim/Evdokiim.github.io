<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contacts-container {
            max-width: 600px;
            margin: 2rem auto;
            background: #fff;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .contact-info {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #eee;
        }
        .contact-info p {
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }
        .contact-info strong {
            color: #2c3e50;
            min-width: 100px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="menu.html">Меню</a></li>
                <li><a href="offers.html">Мероприятия и акции</a></li>
                <li><a href="book.html">Бронирование</a></li>
                <li><a href="contacts.html">Контакты</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1 class="page-title">Контакты</h1>
        <div class="contacts-container">
            <div class="contact-info">
                <p><strong>Адрес:</strong> г.Москва,ул.Тверская,д.15</p>
                <p><strong>Телефон:</strong> +7(900)000-00-00</p>
                <p><strong>Email:</strong> info@caferome.ru</p>
                <p><strong>Часы работы:</strong> Пн-Вс:10:00-23:00</p>
            </div>
            <h2 style="margin-bottom: 1rem; color: #2c3e50;">Напишите нам</h2>
            <form>
                <div class="form-group">
                    <label for="name">Ваше имя</label>
                    <input type="text" id="name" placeholder="Иван">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="ivan@example.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Сообщение</label>
                    <textarea id="message" rows="5"></textarea>
                </div>
                <button type="submit" class="btn">Отправить</button>
            </form>
        </div>
    </main>
</body>
</html>
